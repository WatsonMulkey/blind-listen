<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blind Listen — Test Runner</title>
<style>
  :root {
    --pass:   #22c55e;
    --fail:   #ef4444;
    --skip:   #f59e0b;
    --bg:     #0a0a0f;
    --bg2:    #0f0f1a;
    --bg3:    #141428;
    --border: #1e1e30;
    --text:   #e0e0ee;
    --muted:  #666680;
    --accent: #6366f1;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
    line-height: 1.5;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  /* Summary bar */
  #summary {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
  }

  .summary-stat { display: flex; align-items: center; gap: 0.4rem; }
  .summary-dot { width: 8px; height: 8px; border-radius: 4px; flex-shrink: 0; }
  .dot-pass { background: var(--pass); }
  .dot-fail { background: var(--fail); }
  .dot-skip { background: var(--skip); }

  #progressBar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  #progressFill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s;
  }

  /* Suite headers */
  .suite-header {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 1.5rem 0 0.5rem;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid var(--border);
  }

  /* Test rows */
  .test-row {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.45rem 0.6rem;
    border-radius: 6px;
    font-size: 0.82rem;
    margin-bottom: 2px;
    transition: background 0.1s;
  }

  .test-row.pass { background: rgba(34, 197, 94, 0.06); }
  .test-row.fail { background: rgba(239, 68, 68, 0.10); border: 1px solid rgba(239, 68, 68, 0.2); }
  .test-row.running { background: rgba(99, 102, 241, 0.08); }

  .test-status {
    font-size: 0.75rem;
    font-weight: 700;
    min-width: 42px;
    padding: 0.1rem 0.35rem;
    border-radius: 4px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1.4;
  }

  .test-status.pass { background: rgba(34, 197, 94, 0.15); color: var(--pass); }
  .test-status.fail { background: rgba(239, 68, 68, 0.15); color: var(--fail); }
  .test-status.running { background: rgba(99, 102, 241, 0.15); color: var(--accent); }

  .test-name { flex: 1; color: var(--text); }
  .test-id {
    font-size: 0.68rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    min-width: 90px;
    text-align: right;
    flex-shrink: 0;
  }

  .test-error {
    width: 100%;
    font-size: 0.75rem;
    color: var(--fail);
    background: rgba(239, 68, 68, 0.08);
    border-radius: 4px;
    padding: 0.4rem 0.6rem;
    margin-top: 0.25rem;
    font-family: 'Courier New', monospace;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .footer {
    margin-top: 2rem;
    font-size: 0.7rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<h1>Blind Listen — Test Runner</h1>
<p class="subtitle">Unit tests for pure functions: time formatting, LUFS math, FFT, shuffle, state logic</p>

<div id="summary">
  <span class="summary-stat">
    <span class="summary-dot dot-pass"></span>
    <span id="passCount">0</span> passed
  </span>
  <span class="summary-stat">
    <span class="summary-dot dot-fail"></span>
    <span id="failCount">0</span> failed
  </span>
  <span style="color:var(--muted);margin-left:auto;font-size:0.75rem" id="totalLabel"></span>
</div>
<div id="progressBar"><div id="progressFill"></div></div>

<div id="testOutput"></div>

<p class="footer">
  Open browser console for additional diagnostic output.
  These tests run entirely in-browser — no build step, no server.
</p>

<script>
// ═══════════════════════════════════════════════════════════
// TEST HARNESS
// ═══════════════════════════════════════════════════════════

const results = { pass: 0, fail: 0, total: 0 };
let currentSuite = null;
const output = document.getElementById('testOutput');

function suite(name) {
  currentSuite = name;
  const h = document.createElement('div');
  h.className = 'suite-header';
  h.textContent = name;
  output.appendChild(h);
}

function assert(condition, message) {
  if (!condition) throw new Error(message || 'Assertion failed');
}

function assertApprox(actual, expected, tolerance, label) {
  const delta = Math.abs(actual - expected);
  if (delta > tolerance) {
    throw new Error(
      `${label || 'Value'}: expected ${expected} ±${tolerance}, got ${actual} (delta=${delta.toFixed(6)})`
    );
  }
}

function assertArrayApprox(actual, expected, tolerance, label) {
  if (actual.length !== expected.length) {
    throw new Error(`${label}: array length mismatch: got ${actual.length}, expected ${expected.length}`);
  }
  for (let i = 0; i < expected.length; i++) {
    const delta = Math.abs(actual[i] - expected[i]);
    if (delta > tolerance) {
      throw new Error(`${label}[${i}]: expected ${expected[i]} ±${tolerance}, got ${actual[i]}`);
    }
  }
}

async function test(id, name, fn) {
  results.total++;
  const row = document.createElement('div');
  row.className = 'test-row running';
  row.innerHTML =
    `<span class="test-status running">...</span>` +
    `<span class="test-name">${name}</span>` +
    `<span class="test-id">${id}</span>`;
  output.appendChild(row);

  try {
    await fn();
    row.className = 'test-row pass';
    row.querySelector('.test-status').className = 'test-status pass';
    row.querySelector('.test-status').textContent = 'PASS';
    results.pass++;
  } catch (err) {
    row.className = 'test-row fail';
    row.querySelector('.test-status').className = 'test-status fail';
    row.querySelector('.test-status').textContent = 'FAIL';
    results.fail++;
    const errDiv = document.createElement('div');
    errDiv.className = 'test-error';
    errDiv.textContent = err.message;
    row.appendChild(errDiv);
    console.error(`[FAIL] ${id} — ${name}`, err);
  }

  updateSummary();
}

function updateSummary() {
  document.getElementById('passCount').textContent = results.pass;
  document.getElementById('failCount').textContent = results.fail;
  document.getElementById('totalLabel').textContent = `${results.total} tests`;
  const done = results.pass + results.fail;
  document.getElementById('progressFill').style.width =
    results.total > 0 ? (done / results.total) * 100 + '%' : '0%';
}


// ═══════════════════════════════════════════════════════════
// COPY OF PURE FUNCTIONS FROM app.js
// These must stay in sync with the source. If the source
// changes, update these copies and re-run this file.
// ═══════════════════════════════════════════════════════════

// From js/app.js
function fmt(s) {
  if (s < 0) s = 0;
  const m = Math.floor(s / 60);
  const sec = s % 60;
  const whole = Math.floor(sec);
  const frac = sec - whole;
  if (frac >= 0.05) {
    return `${m}:${whole.toString().padStart(2, '0')}.${Math.floor(frac * 10)}`;
  }
  return `${m}:${whole.toString().padStart(2, '0')}`;
}

function parseTime(str) {
  const parts = str.trim().split(':');
  if (parts.length === 2) {
    const mins = parseInt(parts[0], 10) || 0;
    const secs = parseFloat(parts[1]) || 0;
    return mins * 60 + secs;
  }
  return parseFloat(str) || 0;
}

function fmtSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// From js/metering.js
function getKWeightStage1(fs) {
  const db = 3.999843853973347;
  const f0 = 1681.974450955533;
  const Q  = 0.7071752369554196;
  const K  = Math.tan(Math.PI * f0 / fs);
  const Vh = Math.pow(10, db / 20);
  const Vb = Math.pow(Vh, 0.4996667741545416);
  const a0 = 1 + K / Q + K * K;
  return [
    [(Vh + Vb * K / Q + K * K) / a0, 2 * (K * K - Vh) / a0, (Vh - Vb * K / Q + K * K) / a0],
    [1, 2 * (K * K - 1) / a0, (1 - K / Q + K * K) / a0]
  ];
}

function getKWeightStage2(fs) {
  const f0 = 38.13547087602444;
  const Q  = 0.5003270373238773;
  const K  = Math.tan(Math.PI * f0 / fs);
  const a0 = 1 + K / Q + K * K;
  return [
    [1 / a0, -2 / a0, 1 / a0],
    [1, 2 * (K * K - 1) / a0, (1 - K / Q + K * K) / a0]
  ];
}

function computePeakDBFS_pure(channelArrays) {
  // Pure version that takes raw Float32Array arrays (no AudioBuffer dependency)
  let maxAbs = 0;
  for (const data of channelArrays) {
    for (let i = 0; i < data.length; i++) {
      const a = Math.abs(data[i]);
      if (a > maxAbs) maxAbs = a;
    }
  }
  return maxAbs > 0 ? 20 * Math.log10(maxAbs) : -Infinity;
}

function computeRMSdB_pure(channelArrays) {
  let totalSq = 0;
  let totalSamples = 0;
  for (const data of channelArrays) {
    for (let i = 0; i < data.length; i++) totalSq += data[i] * data[i];
    totalSamples += data.length;
  }
  const rms = Math.sqrt(totalSq / totalSamples);
  return rms > 0 ? 20 * Math.log10(rms) : -Infinity;
}

function computeLevelMatchOffsets(lufsArray) {
  // Pure version: given array of LUFS values, compute gain offsets
  const validLUFS = lufsArray.filter(l => l !== null && isFinite(l));
  if (validLUFS.length < 2) return lufsArray.map(() => 1.0);
  const targetLUFS = validLUFS.reduce((a, b) => a + b, 0) / validLUFS.length;
  return lufsArray.map(l => {
    if (l === null || !isFinite(l)) return 1.0;
    const gainDB = targetLUFS - l;
    return Math.pow(10, gainDB / 20);
  });
}

// From js/audio-engine.js (pure logic extracted)
function getCurrentTime_pure(isPlaying, pausedAt, audioCtxCurrentTime, startedAt, loopEnabled, loopStart, loopEnd) {
  if (!isPlaying) return pausedAt;
  const raw = audioCtxCurrentTime - startedAt;
  if (loopEnabled && loopEnd > loopStart) {
    const loopLen = loopEnd - loopStart;
    if (raw >= loopEnd) {
      return loopStart + ((raw - loopStart) % loopLen);
    }
  }
  return raw;
}

// Shuffle (Fisher-Yates — from app.js)
function fisherYatesShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// From js/loop.js (pure logic extracted)
function rerollLoop_pure(duration) {
  const maxStart = Math.max(0, duration - 5);
  const loopStart = Math.random() * maxStart;
  const maxLen = Math.min(60, duration - loopStart);
  const len = 5 + Math.random() * (maxLen - 5);
  const loopEnd = Math.min(loopStart + len, duration);
  return { loopStart, loopEnd };
}

// Inline radix-2 FFT (from waveform.js)
function computeFFT(real, imag) {
  const n = real.length;
  // Bit-reversal
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    while (j & bit) { j ^= bit; bit >>= 1; }
    j ^= bit;
    if (i < j) {
      let tmp = real[i]; real[i] = real[j]; real[j] = tmp;
      tmp = imag[i]; imag[i] = imag[j]; imag[j] = tmp;
    }
  }
  // Butterfly
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wR = Math.cos(ang);
    const wI = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let curR = 1, curI = 0;
      for (let j = 0; j < len / 2; j++) {
        const uR = real[i + j], uI = imag[i + j];
        const vR = real[i + j + len / 2] * curR - imag[i + j + len / 2] * curI;
        const vI = real[i + j + len / 2] * curI + imag[i + j + len / 2] * curR;
        real[i + j] = uR + vR; imag[i + j] = uI + vI;
        real[i + j + len / 2] = uR - vR; imag[i + j + len / 2] = uI - vI;
        const nr = curR * wR - curI * wI;
        curI = curR * wI + curI * wR;
        curR = nr;
      }
    }
  }
}

// LUFS via OfflineAudioContext — only runs if Web Audio API available
async function computeLUFS_browser(sampleRate, pcmData) {
  // pcmData: Float32Array, single channel
  const len = pcmData.length;
  const ch = 1;
  const offline = new OfflineAudioContext(ch, len, sampleRate);

  const [fb1, fa1] = getKWeightStage1(sampleRate);
  const [fb2, fa2] = getKWeightStage2(sampleRate);

  const stage1 = offline.createIIRFilter(fb1, fa1);
  const stage2 = offline.createIIRFilter(fb2, fa2);

  const buf = offline.createBuffer(ch, len, sampleRate);
  buf.copyToChannel(pcmData, 0);

  const src = offline.createBufferSource();
  src.buffer = buf;
  src.connect(stage1);
  stage1.connect(stage2);
  stage2.connect(offline.destination);
  src.start(0);

  const filtered = await offline.startRendering();
  const channelData = [filtered.getChannelData(0)];

  const blockSize = Math.round(0.4 * sampleRate);
  const stepSize = Math.round(0.1 * sampleRate);

  const blockLoudness = [];
  for (let start = 0; start + blockSize <= len; start += stepSize) {
    let sumMS = 0;
    const d = channelData[0];
    let s = 0;
    for (let i = start; i < start + blockSize; i++) s += d[i] * d[i];
    sumMS += s / blockSize;
    if (sumMS > 0) blockLoudness.push(-0.691 + 10 * Math.log10(sumMS));
  }

  if (blockLoudness.length === 0) return -Infinity;

  const absGated = blockLoudness.filter(l => l > -70);
  if (absGated.length === 0) return -Infinity;

  const absGatedPower = absGated.reduce((s, l) => s + Math.pow(10, (l + 0.691) / 10), 0) / absGated.length;
  const relThreshold = -0.691 + 10 * Math.log10(absGatedPower) - 10;
  const relGated = blockLoudness.filter(l => l > relThreshold);
  if (relGated.length === 0) return -Infinity;

  const finalPower = relGated.reduce((s, l) => s + Math.pow(10, (l + 0.691) / 10), 0) / relGated.length;
  return -0.691 + 10 * Math.log10(finalPower);
}

// ═══════════════════════════════════════════════════════════
// SIGNAL GENERATORS (for deterministic audio tests)
// ═══════════════════════════════════════════════════════════

function generateSineWave(sampleRate, durationSec, frequencyHz, amplitudeLinear) {
  const len = Math.floor(sampleRate * durationSec);
  const data = new Float32Array(len);
  for (let i = 0; i < len; i++) {
    data[i] = amplitudeLinear * Math.sin(2 * Math.PI * frequencyHz * i / sampleRate);
  }
  return data;
}

function generateSilence(sampleRate, durationSec) {
  return new Float32Array(Math.floor(sampleRate * durationSec));
}

// dBFS to linear
function dbToLinear(db) {
  return Math.pow(10, db / 20);
}


// ═══════════════════════════════════════════════════════════
// RUN ALL TESTS
// ═══════════════════════════════════════════════════════════

async function runAllTests() {

  // ─── Suite: Time Formatting (fmt) ─────────────────────────
  suite('TIME FORMATTING — fmt()');

  await test('FMT-001', '0 seconds returns "0:00"', () => {
    assert(fmt(0) === '0:00', `Expected "0:00", got "${fmt(0)}"`);
  });

  await test('FMT-002', 'Negative input clamped to 0', () => {
    assert(fmt(-5) === '0:00', `Expected "0:00" for negative, got "${fmt(-5)}"`);
  });

  await test('FMT-003', '30 seconds returns "0:30"', () => {
    assert(fmt(30) === '0:30', `Expected "0:30", got "${fmt(30)}"`);
  });

  await test('FMT-004', '60 seconds returns "1:00"', () => {
    assert(fmt(60) === '1:00', `Expected "1:00", got "${fmt(60)}"`);
  });

  await test('FMT-005', '90 seconds returns "1:30"', () => {
    assert(fmt(90) === '1:30', `Expected "1:30", got "${fmt(90)}"`);
  });

  await test('FMT-006', '3599 seconds returns "59:59"', () => {
    assert(fmt(3599) === '59:59', `Expected "59:59", got "${fmt(3599)}"`);
  });

  await test('FMT-007', 'Fractional seconds >= 0.05 shows decimal', () => {
    // 30.1 seconds: whole=30, frac=0.1 >= 0.05 → "0:30.1"
    assert(fmt(30.1) === '0:30.1', `Expected "0:30.1", got "${fmt(30.1)}"`);
  });

  await test('FMT-008', 'Fractional seconds < 0.05 truncated', () => {
    // 30.04: frac=0.04 < 0.05 → "0:30"
    assert(fmt(30.04) === '0:30', `Expected "0:30", got "${fmt(30.04)}"`);
  });

  await test('FMT-009', 'Seconds are zero-padded', () => {
    assert(fmt(65) === '1:05', `Expected "1:05", got "${fmt(65)}"`);
  });

  await test('FMT-010', 'Large value (10 minutes)', () => {
    assert(fmt(600) === '10:00', `Expected "10:00", got "${fmt(600)}"`);
  });

  await test('FMT-011', '9.9 seconds (boundary: 0.9 frac >= 0.05)', () => {
    // 9.9: whole=9, frac=0.9 >= 0.05 → "0:09.9"
    assert(fmt(9.9) === '0:09.9', `Expected "0:09.9", got "${fmt(9.9)}"`);
  });


  // ─── Suite: Time Parsing (parseTime) ──────────────────────
  suite('TIME PARSING — parseTime()');

  await test('PT-001', '"0:00" parses to 0', () => {
    assertApprox(parseTime('0:00'), 0, 0.001, 'parseTime("0:00")');
  });

  await test('PT-002', '"0:30" parses to 30', () => {
    assertApprox(parseTime('0:30'), 30, 0.001, 'parseTime("0:30")');
  });

  await test('PT-003', '"1:30" parses to 90', () => {
    assertApprox(parseTime('1:30'), 90, 0.001, 'parseTime("1:30")');
  });

  await test('PT-004', '"1:30.5" parses to 90.5', () => {
    assertApprox(parseTime('1:30.5'), 90.5, 0.001, 'parseTime("1:30.5")');
  });

  await test('PT-005', 'Empty string returns 0', () => {
    assertApprox(parseTime(''), 0, 0.001, 'parseTime("")');
  });

  await test('PT-006', 'Non-numeric string returns 0', () => {
    assertApprox(parseTime('abc'), 0, 0.001, 'parseTime("abc")');
  });

  await test('PT-007', 'Plain number string (no colon) parses as seconds', () => {
    assertApprox(parseTime('45'), 45, 0.001, 'parseTime("45")');
  });

  await test('PT-008', 'Leading/trailing whitespace trimmed', () => {
    assertApprox(parseTime('  1:00  '), 60, 0.001, 'parseTime("  1:00  ")');
  });

  await test('PT-009', '"0:00.0" parses to 0', () => {
    assertApprox(parseTime('0:00.0'), 0, 0.001, 'parseTime("0:00.0")');
  });

  await test('PT-010', '"10:00" parses to 600', () => {
    assertApprox(parseTime('10:00'), 600, 0.001, 'parseTime("10:00")');
  });


  // ─── Suite: File Size Formatting (fmtSize) ─────────────────
  suite('FILE SIZE FORMATTING — fmtSize()');

  await test('FS-001', 'Bytes < 1MB formatted as KB', () => {
    const r = fmtSize(512 * 1024); // 512KB
    assert(r === '512 KB', `Expected "512 KB", got "${r}"`);
  });

  await test('FS-002', 'Bytes >= 1MB formatted as MB', () => {
    const r = fmtSize(2 * 1024 * 1024); // 2MB
    assert(r === '2.0 MB', `Expected "2.0 MB", got "${r}"`);
  });

  await test('FS-003', '1MB exactly', () => {
    const r = fmtSize(1024 * 1024);
    assert(r === '1.0 MB', `Expected "1.0 MB", got "${r}"`);
  });

  await test('FS-004', 'Small file (100 bytes)', () => {
    const r = fmtSize(100);
    assert(r.endsWith(' KB'), `Expected " KB" suffix, got "${r}"`);
  });

  await test('FS-005', '500MB file', () => {
    const r = fmtSize(500 * 1024 * 1024);
    assert(r === '500.0 MB', `Expected "500.0 MB", got "${r}"`);
  });


  // ─── Suite: Peak dBFS ──────────────────────────────────────
  suite('PEAK dBFS — computePeakDBFS_pure()');

  await test('PEAK-001', 'Full scale signal (amplitude 1.0) = 0 dBFS', () => {
    const data = new Float32Array([0.5, 1.0, -0.8, 0.3]);
    const result = computePeakDBFS_pure([data]);
    assertApprox(result, 0.0, 0.001, 'Peak dBFS (full scale)');
  });

  await test('PEAK-002', '-6 dBFS signal', () => {
    const amp = dbToLinear(-6);
    const data = new Float32Array([amp, -amp, amp * 0.5]);
    const result = computePeakDBFS_pure([data]);
    assertApprox(result, -6.0, 0.01, 'Peak dBFS (-6dB)');
  });

  await test('PEAK-003', 'Silence returns -Infinity', () => {
    const data = new Float32Array(1000); // all zeros
    const result = computePeakDBFS_pure([data]);
    assert(result === -Infinity, `Expected -Infinity for silence, got ${result}`);
  });

  await test('PEAK-004', 'Multichannel: uses max across all channels', () => {
    const ch0 = new Float32Array([0.2, 0.3]);
    const ch1 = new Float32Array([0.8, 0.1]); // peak is here
    const result = computePeakDBFS_pure([ch0, ch1]);
    assertApprox(result, 20 * Math.log10(0.8), 0.001, 'Multichannel peak');
  });

  await test('PEAK-005', 'Negative samples use absolute value', () => {
    const data = new Float32Array([-0.9, 0.5]);
    const result = computePeakDBFS_pure([data]);
    assertApprox(result, 20 * Math.log10(0.9), 0.001, 'Negative sample peak');

    }
    for (let i = 0; i < N; i++) {
      assert(window[i] >= -1e-10 && window[i] <= 1.0 + 1e-10,
        `w[${i}] = ${window[i]} is out of [0,1]`);
    }
  });


  // ─── Suite: Export text building (pure logic) ─────────────
  suite('EXPORT TEXT — buildExportText() logic');

  await test('EX-UNIT-001', 'Date format is YYYY-MM-DD', () => {
    const date = new Date().toISOString().split('T')[0];
    assert(/^\d{4}-\d{2}-\d{2}$/.test(date),
      `Date format wrong: "${date}"`);
  });

  await test('EX-UNIT-002', 'LUFS formatted to 1 decimal place', () => {
    const lufs = -23.456789;
    const s = lufs.toFixed(1);
    assert(s === '-23.5', `Expected "-23.5", got "${s}"`);
  });

  await test('EX-UNIT-003', 'LUFS non-finite formatted as "--"', () => {
    const format = (lufs) =>
      (lufs !== null && isFinite(lufs)) ? lufs.toFixed(1) + ' LUFS' : '--';
    assert(format(-Infinity) === '--', 'Expected "--" for -Infinity');
    assert(format(null) === '--', 'Expected "--" for null');
    assert(format(NaN) === '--', 'Expected "--" for NaN');
    assert(format(-23.1) === '-23.1 LUFS', 'Expected "-23.1 LUFS"');
  });

  await test('EX-UNIT-004', 'File extension stripped from filename', () => {
    const stripExt = (name) => name.replace(/\.[^.]+$/, '');
    assert(stripExt('mix_v2.wav') === 'mix_v2', `Wrong: ${stripExt('mix_v2.wav')}`);
    assert(stripExt('track.final.flac') === 'track.final', `Wrong: ${stripExt('track.final.flac')}`);
    assert(stripExt('noextension') === 'noextension', `Wrong: ${stripExt('noextension')}`);
  });


  // ─── Suite: File validation logic ─────────────────────────
  suite('FILE VALIDATION — handleFiles() logic');

  await test('FV-001', 'Audio file detected by MIME type audio/*', () => {
    const mockFile = { type: 'audio/wav', name: 'test.wav' };
    const isAudio = mockFile.type.startsWith('audio/') ||
      /\.(wav|mp3|flac|aiff|ogg|m4a|aac|wma)$/i.test(mockFile.name);
    assert(isAudio, 'audio/wav should be detected as audio');
  });

  await test('FV-002', 'Audio file detected by extension when MIME is blank', () => {
    const mockFile = { type: '', name: 'recording.flac' };
    const isAudio = mockFile.type.startsWith('audio/') ||
      /\.(wav|mp3|flac|aiff|ogg|m4a|aac|wma)$/i.test(mockFile.name);
    assert(isAudio, '.flac extension should be detected as audio');
  });

  await test('FV-003', 'Non-audio file rejected', () => {
    const mockFile = { type: 'text/plain', name: 'notes.txt' };
    const isAudio = mockFile.type.startsWith('audio/') ||
      /\.(wav|mp3|flac|aiff|ogg|m4a|aac|wma)$/i.test(mockFile.name);
    assert(!isAudio, 'text/plain should NOT be detected as audio');
  });

  await test('FV-004', 'Image file rejected', () => {
    const mockFile = { type: 'image/jpeg', name: 'cover.jpg' };
    const isAudio = mockFile.type.startsWith('audio/') ||
      /\.(wav|mp3|flac|aiff|ogg|m4a|aac|wma)$/i.test(mockFile.name);
    assert(!isAudio, 'image/jpeg should NOT be detected as audio');
  });

  await test('FV-005', 'File count check: 5 files + 1 = 6 > max(5) → rejected', () => {
    const currentCount = 5;
    const newCount = 1;
    const totalAfter = currentCount + newCount;
    assert(totalAfter > 5, `totalAfter (${totalAfter}) should exceed max 5`);
  });

  await test('FV-006', 'File count check: 2 files + 3 = 5 = max(5) → accepted', () => {
    const currentCount = 2;
    const newCount = 3;
    const totalAfter = currentCount + newCount;
    assert(totalAfter <= 5, `totalAfter (${totalAfter}) should be <= max 5`);
  });

  await test('FV-007', 'Audio MIME types accepted: all standard types', () => {
    const types = ['audio/wav', 'audio/mp3', 'audio/mpeg', 'audio/flac',
                   'audio/ogg', 'audio/aac', 'audio/x-m4a', 'audio/wma'];
    for (const t of types) {
      assert(t.startsWith('audio/'), `Type ${t} should start with audio/`);
    }
  });


  // ─── Suite: Duration mismatch detection ───────────────────
  suite('DURATION MISMATCH — warning trigger logic');

  await test('DUR-001', 'Two equal durations: no warning', () => {
    const durations = [180.0, 180.0];
    const minDur = Math.min(...durations);
    const maxDur = Math.max(...durations);
    const shouldWarn = maxDur / minDur > 1.10;
    assert(!shouldWarn, 'Equal durations should not trigger warning');
  });

  await test('DUR-002', '10% difference exactly: no warning (threshold is >1.10)', () => {
    const durations = [100.0, 110.0]; // exactly 10% difference
    const minDur = Math.min(...durations);
    const maxDur = Math.max(...durations);
    const ratio = maxDur / minDur; // = 1.10 exactly
    const shouldWarn = ratio > 1.10;
    assert(!shouldWarn, `Exactly 10% difference (ratio=${ratio}) should NOT trigger warning`);
  });

  await test('DUR-003', '11% difference: warning triggered', () => {
    const durations = [100.0, 111.0];
    const minDur = Math.min(...durations);
    const maxDur = Math.max(...durations);
    const shouldWarn = maxDur / minDur > 1.10;
    assert(shouldWarn, '11% difference should trigger warning');
  });

  await test('DUR-004', 'Very different durations (3min vs 30sec): warning triggered', () => {
    const durations = [180.0, 30.0];
    const minDur = Math.min(...durations);
    const maxDur = Math.max(...durations);
    const shouldWarn = maxDur / minDur > 1.10;
    assert(shouldWarn, '6x duration ratio should trigger warning');
  });

  await test('DUR-005', 'Single duration: no comparison possible → no warning', () => {
    const durations = [180.0];
    const shouldWarn = durations.length >= 2 && Math.max(...durations) / Math.min(...durations) > 1.10;
    assert(!shouldWarn, 'Single duration should never trigger warning');
  });


  // ─── Suite: Session timer display logic ───────────────────
  suite('SESSION TIMER — updateTimerDisplay() state logic');

  await test('TIM-001', 'fmt(600) = "10:00" (initial state)', () => {
    assert(fmt(600) === '10:00', `Expected "10:00", got "${fmt(600)}"`);
  });

  await test('TIM-002', 'fmt(120) = "2:00" (warning boundary)', () => {
    assert(fmt(120) === '2:00', `Expected "2:00", got "${fmt(120)}"`);
  });

  await test('TIM-003', 'fmt(30) = "0:30" (critical boundary)', () => {
    assert(fmt(30) === '0:30', `Expected "0:30", got "${fmt(30)}"`);
  });

  await test('TIM-004', 'fmt(0) = "0:00" (ended state)', () => {
    assert(fmt(0) === '0:00', `Expected "0:00", got "${fmt(0)}"`);
  });

  await test('TIM-005', 'Warning threshold: seconds <= 120 is warning', () => {
    const isWarning = (s) => s > 30 && s <= 120;
    assert(isWarning(119), '119s should be warning');
    assert(isWarning(31), '31s should be warning');
    assert(!isWarning(121), '121s should NOT be warning');
    assert(!isWarning(30), '30s should be critical, not warning');
  });

  await test('TIM-006', 'Critical threshold: seconds <= 30 is critical', () => {
    const isCritical = (s) => s <= 30;
    assert(isCritical(30), '30s is critical');
    assert(isCritical(1), '1s is critical');
    assert(isCritical(0), '0s is critical');
    assert(!isCritical(31), '31s is not critical');
  });


  // ─── Final summary ─────────────────────────────────────────
  const allPass = results.fail === 0;
  const finalDiv = document.createElement('div');
  finalDiv.style.cssText = `
    margin-top: 2rem;
    padding: 1rem;
    background: ${allPass ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)'};
    border: 1px solid ${allPass ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)'};
    border-radius: 10px;
    text-align: center;
    font-weight: 600;
    font-size: 0.95rem;
    color: ${allPass ? '#22c55e' : '#ef4444'};
  `;
  finalDiv.textContent = allPass
    ? `All ${results.total} tests passed.`
    : `${results.fail} of ${results.total} tests failed. See red rows above.`;
  output.appendChild(finalDiv);

  updateSummary();
  console.log(`Test run complete: ${results.pass} passed, ${results.fail} failed, ${results.total} total`);
}

runAllTests();
</script>
</body>
</html>
